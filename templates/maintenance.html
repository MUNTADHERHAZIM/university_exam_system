<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأنظمة - صيانة مجدولة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #bfa15f;
            --accent-glow: rgba(191, 161, 95, 0.3);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background mesh */
        .mesh-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1e293b 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #1e293b 0%, transparent 40%);
            z-index: -1;
        }

        .glow-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .maintenance-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem 2rem;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .maintenance-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .icon-box {
            width: 120px;
            height: 120px;
            background: rgba(191, 161, 95, 0.1);
            border: 1px solid var(--accent);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            position: relative;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 20px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }

        .icon-box i {
            font-size: 4rem;
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent));
        }

        h1 {
            font-weight: 900;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom left, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1.25rem;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 0.75rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            font-weight: 600;
        }

        .indicator {
            width: 10px;
            height: 10px;
            background: #eab308;
            border-radius: 50%;
            box-shadow: 0 0 10px #eab308;
        }

        .footer-logo {
            position: absolute;
            bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: #475569;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="glow-blob" style="top: 20%; left: 30%;"></div>
    <div class="glow-blob" style="bottom: 10%; right: 20%; background: #0ea5e9;"></div>

    <div class="maintenance-card">
        <div class="icon-box">
            <i class="bi bi-gear-wide-connected"></i>
        </div>
        
        <h1>عملية تطوير وتحديث</h1>
        
        <p>
            {{ message|default:"نقوم حالياً بإجراء تحديثات دورية لضمان أفضل تجربة تعليمية واختبارية ممكنة. نعتذر عن هذا التوقف المؤقت وسنعود إليكم خلال وقت قصير." }}
        </p>

        <div class="status-badge">
            <span class="indicator"></span>
            الحالة: قيد الصيانة المجدولة
        </div>
    </div>

    <div class="footer-logo">
        <i class="bi bi-mortarboard-fill"></i> الإدارة العامة للاختبارات الجامعية
    </div>
</body>
</html>
